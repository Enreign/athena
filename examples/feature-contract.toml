# examples/feature-contract.toml
#
# Annotated feature contract example.
# See docs/feature-contract-v1.md for the full schema reference.
# See docs/feature-contract-workflow.md for the end-to-end dispatch workflow.
#
# Usage:
#   cp examples/feature-contract.toml my-feature.toml
#   # Edit to describe your feature
#   cargo run -- feature dispatch --contract my-feature.toml

[contract]
# Unique identifier for this contract (snake_case).
id = "add_rate_limit_header_logging"

# Human-readable title shown in logs and Telegram.
title = "Log rate-limit response headers for all LLM providers"

# Version of the contract schema.
schema_version = "v1"

# Who or what generated this contract (optional).
author = "maintainer"

[feature]
# One-sentence statement of the change.
goal = "Capture X-RateLimit-* headers from LLM HTTP responses and emit them as an observer event."

# Why this feature matters.
motivation = """
When the LLM provider rate-limits Athena, there is currently no structured record
of the limit, remaining, and reset values. Adding this logging enables the KPI
pipeline to track quota consumption over time.
"""

# Which ghost should handle the implementation task.
ghost = "coder"

# Execution strategy: "code" | "react" | "plan-act"
strategy = "code"

[acceptance]
# Shell commands that must exit 0 for the feature to be accepted.
# Each command is run inside the Docker container after the patch is applied.
commands = [
  "cargo check -q",
  "cargo test -q",
  "python3 scripts/dead_code_check.py --telegram",
  "python3 scripts/wiring_check.py",
]

# Optional: regex patterns that must appear in the final diff.
diff_must_contain = [
  "RateLimit",
  "ObserverCategory",
]

[meta]
# Linked Linear / GitHub issue IDs for writeback (optional).
linear_issue_id = ""
github_issue_number = 0

# Tags used for KPI lane routing.
tags = ["observability", "llm"]
